name: Build IPK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 25.12.3
  OPENWRT_TARGET: qualcommax/ipq807x
  OPENWRT_ARCH: aarch64_cortex-a53
  SDK_NAME: openwrt-sdk-25.12.3-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64
  PACKAGE_NAME: luci-app-internet-led

concurrency:
  group: build-ipk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipk:
    name: Build OpenWrt IPK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget tar zstd

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${SDK_NAME}.tar.zst"
          wget "$SDK_URL"
          tar -xf "${SDK_NAME}.tar.zst"

      - name: Copy package into SDK
        run: |
          mkdir -p "${SDK_NAME}/package/${PACKAGE_NAME}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='*.tar.gz' \
            --exclude='*.tar.zst' \
            --exclude='*.ipk' \
            --exclude="${SDK_NAME}" \
            --exclude='artifacts' \
            ./ "${SDK_NAME}/package/${PACKAGE_NAME}/"

      - name: Build package
        working-directory: ${{ env.SDK_NAME }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          make defconfig
          make package/${PACKAGE_NAME}/compile V=s

      - name: Collect IPK and checksums
        run: |
          mkdir -p artifacts
          IPK_PATH="$(find "${SDK_NAME}/bin/packages" -name "${PACKAGE_NAME}_*.ipk" -print -quit)"

          if [ -z "$IPK_PATH" ]; then
            echo "No ${PACKAGE_NAME} .ipk was built"
            find "${SDK_NAME}/bin/packages" -maxdepth 5 -type f || true
            exit 1
          fi

          cp "$IPK_PATH" artifacts/
          cd artifacts
          sha256sum ./*.ipk > SHA256SUMS

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_ARCH }}
          path: |
            artifacts/*.ipk
            artifacts/SHA256SUMS
          if-no-files-found: error
