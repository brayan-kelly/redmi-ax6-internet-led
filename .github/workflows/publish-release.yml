name: Publish Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get tag name and version
        id: get_tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          VERSION=${TAG_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ steps.get_tag.outputs.TAG_NAME }}" == *"-beta"* || "${{ steps.get_tag.outputs.TAG_NAME }}" == *"-rc"* || "${{ steps.get_tag.outputs.TAG_NAME }}" == *"-alpha"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release version"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "This is a stable release"
          fi
      
      - name: Set release title based on tag type
        id: release_title
        run: |
          TAG="${{ steps.get_tag.outputs.TAG_NAME }}"
          
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "RELEASE_TITLE=Beta - $TAG" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "RELEASE_TITLE=Pre-release - $TAG" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == *"-alpha"* ]]; then
            echo "RELEASE_TITLE=Alpha-release - $TAG" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TITLE=Release - $TAG" >> $GITHUB_OUTPUT
          fi
      
      - name: Get tag message (strip PGP signature)
        id: tag_message
        run: |
          # Get tag message and remove PGP signature block
          TAG_MSG=$(git tag -l --format='%(contents)' "${{ steps.get_tag.outputs.TAG_NAME }}" | sed '/-----BEGIN PGP SIGNATURE-----/,/-----END PGP SIGNATURE-----/d')
          
          # Remove any trailing empty lines
          TAG_MSG=$(echo "$TAG_MSG" | sed '/^$/N;/\n$/D')
          
          echo "TAG_MESSAGE<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Install OpenWrt package build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools rsync \
            unzip zlib1g-dev file wget tar zstd

      - name: Build OpenWrt package
        env:
          OPENWRT_VERSION: 25.12.3
          OPENWRT_TARGET: qualcommax/ipq807x
          SDK_NAME: openwrt-sdk-25.12.3-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64
          PACKAGE_NAME: luci-app-internet-led
          PACKAGE_EXT: apk
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${SDK_NAME}.tar.zst"
          wget "$SDK_URL"
          tar -xf "${SDK_NAME}.tar.zst"

          mkdir -p "${SDK_NAME}/package/${PACKAGE_NAME}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='*.tar.gz' \
            --exclude='*.tar.zst' \
            --exclude='*.apk' \
            --exclude='*.ipk' \
            --exclude='*.sha256' \
            --exclude='*.sha1' \
            --exclude='*.md5' \
            --exclude='*.checksums' \
            --exclude='checksums.json' \
            --exclude="${SDK_NAME}" \
            --exclude='package-artifacts' \
            ./ "${SDK_NAME}/package/${PACKAGE_NAME}/"

          VERSION="${{ steps.get_tag.outputs.VERSION }}"
          VERSION="${VERSION%%-*}"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" "${SDK_NAME}/package/${PACKAGE_NAME}/Makefile"

          pushd "${SDK_NAME}"
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          popd

          make -C "${SDK_NAME}" defconfig
          make -C "${SDK_NAME}" "package/${PACKAGE_NAME}/compile" V=s

          mkdir -p package-artifacts
          PACKAGE_PATH="$(find "${SDK_NAME}/bin/packages" \( -name "${PACKAGE_NAME}-*.${PACKAGE_EXT}" -o -name "${PACKAGE_NAME}_*.${PACKAGE_EXT}" \) -print -quit)"

          if [ -z "$PACKAGE_PATH" ]; then
            echo "No ${PACKAGE_NAME} .${PACKAGE_EXT} was built"
            find "${SDK_NAME}/bin/packages" -maxdepth 5 -type f || true
            exit 1
          fi

          cp "$PACKAGE_PATH" package-artifacts/
          cd package-artifacts
          sha256sum ./*.${PACKAGE_EXT} > SHA256SUMS
          PACKAGE_FILE="$(basename "$PACKAGE_PATH")"
          cat > checksums.json << EOF
          {
            "artifact": "$PACKAGE_FILE",
            "release": "${{ steps.get_tag.outputs.TAG_NAME }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "checksums": {
              "sha256": "$(sha256sum "$PACKAGE_FILE" | awk '{print $1}')"
            }
          }
          EOF
      
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
          name: ${{ steps.release_title.outputs.RELEASE_TITLE }}
          body: ${{ steps.tag_message.outputs.TAG_MESSAGE }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE == 'true' }}
          make_latest: true
          files: |
            package-artifacts/*.apk
            package-artifacts/SHA256SUMS
            package-artifacts/checksums.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
